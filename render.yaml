services:
  - type: web
    name: fraudlens-ai-rohit97116
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
